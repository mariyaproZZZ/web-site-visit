<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Электронный табель</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* Стили прямо в HTML для надёжности */
    .fade-circle-top-right {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135, 206, 250, 0.4), transparent 70%);
      filter: blur(100px);
      top: -200px;
      right: -200px;
      z-index: 0;
      pointer-events: none;
    }
    .fade-circle-bottom-left {
      position: fixed;
      width: 550px;
      height: 550px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(146, 205, 71, 0.35), transparent 70%);
      filter: blur(100px);
      bottom: -200px;
      left: -200px;
      z-index: 0;
      pointer-events: none;
    }
    .fade-circle-center {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135, 206, 250, 0.2), transparent 70%);
      filter: blur(80px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }
    * {
      font-family: 'Nunito', 'Segoe UI', Roboto, sans-serif !important;
    }
  </style>
</head>
<body>
  <!-- КРУГИ -->
  <div class="fade-circle-top-right"></div>
  <div class="fade-circle-bottom-left"></div>
  <div class="fade-circle-center"></div>
  
  <div id="root"></div>
  <div id="portal-root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
